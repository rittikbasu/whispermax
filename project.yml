name: WhisperMax
options:
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Release
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_NAME: whispermax
    PRODUCT_BUNDLE_IDENTIFIER: com.whispermax.app
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_ENTITLEMENTS: WhisperMax/WhisperMax.entitlements
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_DEBUG_DYLIB: NO
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: WhisperMax/Info.plist
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
targets:
  WhisperMax:
    type: application
    platform: macOS
    sources:
      - path: WhisperMax
    dependencies:
      - package: Sparkle
      - framework: Vendor/whisper.xcframework
        embed: true
