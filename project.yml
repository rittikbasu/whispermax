name: WhisperMax
options:
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Release
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_NAME: WhisperMax
    PRODUCT_BUNDLE_IDENTIFIER: com.whispermax.app
    CODE_SIGN_ENTITLEMENTS: WhisperMax/WhisperMax.entitlements
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_DEBUG_DYLIB: NO
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: WhisperMax
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSMicrophoneUsageDescription: WhisperMax records your voice for local transcription.
    INFOPLIST_KEY_NSAccessibilityUsageDescription: WhisperMax needs Accessibility access to insert transcriptions into other apps.
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
targets:
  WhisperMax:
    type: application
    platform: macOS
    sources:
      - path: WhisperMax
    dependencies:
      - framework: Vendor/whisper.xcframework
        embed: true
